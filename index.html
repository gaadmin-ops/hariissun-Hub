<!DOCTYPE html>
<html>
<head>
    <title>hariissun-Hub</title>
    <style>
        /* CSS: Ini buat dandanin webnya biar gak kaku */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: #e3f2fd; 
            padding: 50px;
        }
        .wadah {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: auto;
        }
        button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #1976D2; }
        .angka { font-size: 40px; font-weight: bold; color: #2196F3; }
    </style>
</head>
<body>

    <div class="wadah">
        <h1>hariissun-Hub</h1>
        <hr>

        <h3>Laci 1: Web Testing</h3>
        <p>Halo! Nama gue <b>Omuy</b>.</p>
        <p>Web ini adalah web testing</p>

        <hr>

        <h3>Laci 2: Mesin Penghitung</h3>
        <p>Coba klik tombol di bawah ini:</p>
        <div class="angka" id="hitungan">0</div>
        <br>
        <button onclick="tambahAngka()">Tambah +1</button>
        <button onclick="resetAngka()" style="background-color: #f44336;">Reset</button>
    </div>

    <script>
        // JavaScript: Ini "Otak" biar tombolnya jalan
        let jumlah = 0;

        function tambahAngka() {
            jumlah = jumlah + 1; // Nambahin angka 1 tiap diklik
            document.getElementById("hitungan").innerText = jumlah;
        }

        function resetAngka() {
            jumlah = 0; // Balikin ke nol
            document.getElementById("hitungan").innerText = jumlah;
        }
    </script>

</body>
</html>
